<body>

<div id="game-container"></div>

<!-- GameDistribution SDK -->
<script>
  window["GD_OPTIONS"] = {
    "gameId": "96c5045cd38a4fb4a9c85a03aaed131a",
    "onEvent": function(event) {
      switch(event.name) {
        case "SDK_GAME_START":
          if (window.AudioManager) AudioManager.resume();
          break;
        case "SDK_READY":
          console.log('[GD] SDK Ready');
          break;
      }
    }
  };
  (function(d, s, id) {
    var js, fjs = d.getElementsByTagName(s)[0];
    if (d.getElementById(id)) return;
    js = d.createElement(s); js.id = id;
    js.src = 'https://html5.api.gamedistribution.com/main.min.js';
    fjs.parentNode.insertBefore(js, fjs);
  }(document, 'script', 'gamedistribution-jssdk'));
</script>

<!-- Phaser 3 -->
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<!-- AdsManager — GameDistribution -->
<script>
const AdsManager = {
  init() {},
  showBanner() {},
  hideBanner() {},
  showInterstitial() {
    if (window.gdsdk && gdsdk.showAd) {
      gdsdk.showAd(gdsdk.AdType.Interstitial).catch(() => {});
    }
  },
  showRewarded(cb) {
    if (window.gdsdk && gdsdk.showAd) {
      gdsdk.showAd(gdsdk.AdType.Rewarded)
        .then(() => { if (typeof cb === 'function') cb(); })
        .catch(() => { if (typeof cb === 'function') cb(); });
    } else {
      if (typeof cb === 'function') cb();
    }
  },
  isRewardedReady() { return false; },
};
</script>

<!-- Game -->
<script src="audio.js"></script>
<script src="vfx.js"></script>
<script src="themes.js"></script>
<script src="game.js"></script>

</body>
